<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ข้อมูลสถิติจังหวัดหนองบัวลำภู</title>
<meta name="description" content="ศูนย์รวมข้อมูลสถิติจังหวัดหนองบัวลำภู — สังคม เศรษฐกิจ ทรัพยากรธรรมชาติและสิ่งแวดล้อม">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fafaf7;
  --card:#ffffff;
  --line:#e6e8e2;
  --line-soft:#eef0ea;
  --ink:#1a2420;
  --ink-soft:#5d6862;
  --ink-faint:#97a09a;
  --teal:#0e6e56;
  --teal-deep:#0a523f;
  --teal-soft:#e3f2ec;
  --blue:#1d5fa5;
  --blue-soft:#e7f0fa;
  --green:#3f7a1e;
  --green-soft:#ecf4e3;
  --amber:#a16307;
  --amber-soft:#faf1de;
  --pink:#a8385e;
  --pink-soft:#f9eaf0;
  --radius-xl:30px;
  --radius-lg:22px;
  --radius-md:16px;
  --shadow-sm:0 1px 3px rgba(26,36,32,.05);
  --shadow-hover:0 14px 36px rgba(26,36,32,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;background:#fafaf7}
body{
  font-family:'Noto Sans Thai',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  padding:34px clamp(14px,4vw,52px) 56px;
}

/* ---------- Header ---------- */
.header{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:20px;flex-wrap:wrap;
  max-width:1480px;margin:0 auto 14px;
}
.title-block{flex:1;min-width:280px}
.eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  font-size:clamp(12px,1.3vw,14.5px);font-weight:600;
  color:var(--teal);
  background:var(--teal-soft);
  border-radius:999px;padding:6px 16px;
  margin-bottom:14px;
}
.eyebrow::before{
  content:'';width:7px;height:7px;border-radius:50%;
  background:var(--teal);
}
.title-block h1{
  font-size:clamp(28px,4.8vw,54px);
  font-weight:800;letter-spacing:-1px;line-height:1.12;
  color:var(--ink);
}
.title-block h1 .accent{color:var(--teal)}
.year-box{
  display:flex;flex-direction:column;gap:7px;min-width:160px;
}
.year-label{
  color:var(--ink-faint);font-size:13px;font-weight:600;
  text-align:center;letter-spacing:.4px;
}
.year-select-wrap{position:relative}
.year-select{
  appearance:none;-webkit-appearance:none;
  width:100%;
  background:var(--teal);color:#fff;
  border:none;border-radius:999px;
  font-family:inherit;font-size:clamp(19px,2vw,26px);font-weight:700;
  padding:12px 50px 12px 34px;text-align:center;
  cursor:pointer;transition:background .2s;
  box-shadow:0 4px 14px rgba(14,110,86,.28);
}
.year-select:hover,.year-select:focus{background:var(--teal-deep);outline:none}
.year-select:focus-visible{outline:3px solid rgba(14,110,86,.35);outline-offset:2px}
.year-select option{color:var(--ink);background:#fff}
.year-select-wrap::after{
  content:'▾';position:absolute;right:22px;top:50%;
  transform:translateY(-50%);color:rgba(255,255,255,.85);
  font-size:17px;pointer-events:none;
}

.header-rule{
  max-width:1480px;margin:0 auto 30px;
  height:1px;background:linear-gradient(90deg,var(--teal) 0 110px,var(--line) 110px 100%);
}

/* ---------- Main category cards ---------- */
.main-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:22px;
  max-width:1480px;margin:0 auto 26px;
}
.cat-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px;
  display:flex;flex-direction:column;gap:14px;
  text-decoration:none;color:var(--ink);
  box-shadow:var(--shadow-sm);
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.cat-card:hover{
  transform:translateY(-6px);
  box-shadow:var(--shadow-hover);
  border-color:#d7dad2;
}
.cat-card:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
.cat-head{display:flex;align-items:center;gap:12px}
.cat-icon{
  width:52px;height:52px;flex-shrink:0;
  border-radius:15px;
  display:flex;align-items:center;justify-content:center;
}
.cat-icon svg{width:28px;height:28px}
.chip-social{background:var(--blue-soft);color:var(--blue)}
.chip-econ{background:var(--green-soft);color:var(--green)}
.chip-env{background:var(--teal-soft);color:var(--teal)}
.chip-default{background:var(--line-soft);color:var(--ink-soft)}
.cat-title{font-size:clamp(15px,1.5vw,20px);font-weight:700;line-height:1.35}
.cat-img{
  width:100%;aspect-ratio:16/9.4;
  border-radius:var(--radius-md);
  object-fit:cover;background:var(--line-soft);
  display:block;
}
.cat-img.placeholder{
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:13.5px;
  border:1px dashed var(--line);
}
.cat-foot{
  display:flex;align-items:center;justify-content:flex-end;gap:6px;
  font-size:13px;font-weight:600;color:var(--teal);
}
.cat-foot svg{width:15px;height:15px;transition:transform .2s}
.cat-card:hover .cat-foot svg{transform:translateX(4px)}

/* ---------- Bottom row ---------- */
.bottom-grid{
  display:grid;grid-template-columns:minmax(320px,1.05fr) 1.5fr;gap:22px;
  max-width:1480px;margin:0 auto;align-items:stretch;
}
.highlight-card,.internal-wrap{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:22px;
  box-shadow:var(--shadow-sm);
}
.section-head{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.info-badge{
  width:34px;height:34px;border-radius:11px;
  background:var(--amber-soft);color:var(--amber);
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;font-style:italic;
}
.db-badge{
  width:34px;height:34px;border-radius:11px;
  background:var(--pink-soft);color:var(--pink);
  display:flex;align-items:center;justify-content:center;
}
.db-badge svg{width:19px;height:19px}
.section-head h2{font-size:clamp(17px,1.8vw,22px);font-weight:700;color:var(--ink)}
.thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.thumb{
  text-decoration:none;color:var(--ink);
  display:flex;flex-direction:column;gap:8px;
  border-radius:var(--radius-md);
  transition:transform .2s;
}
.thumb:hover{transform:translateY(-4px)}
.thumb:focus-visible{outline:3px solid var(--teal);outline-offset:3px}
.thumb img,.thumb .ph{
  width:100%;aspect-ratio:1/1;border-radius:var(--radius-md);
  object-fit:cover;background:var(--line-soft);display:block;
}
.thumb .ph{
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);border:1px dashed var(--line);
}
.thumb .ph svg{width:32px;height:32px}
.thumb-label{font-size:clamp(13px,1.3vw,16px);font-weight:600;text-align:center}

.internal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.internal-item{
  text-decoration:none;color:var(--ink-soft);
  display:flex;flex-direction:column;align-items:center;gap:9px;
  padding:16px 8px 13px;
  border-radius:var(--radius-md);
  background:var(--bg);
  border:1px solid var(--line-soft);
  transition:background .2s,border-color .2s,transform .2s,box-shadow .2s;
}
.internal-item:hover{
  background:#fff;border-color:#d7dad2;
  transform:translateY(-4px);box-shadow:var(--shadow-hover);
}
.internal-item:focus-visible{outline:3px solid var(--teal);outline-offset:2px}
.internal-icon{
  width:58px;height:58px;border-radius:17px;
  background:#fff;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--teal);
}
.internal-icon img{width:100%;height:100%;object-fit:cover;border-radius:17px}
.internal-icon svg{width:29px;height:29px}
.internal-label{
  font-size:clamp(11.5px,1.1vw,14px);font-weight:700;
  text-align:center;line-height:1.35;color:var(--ink);
}
.internal-sub{
  font-size:clamp(10.5px,1vw,12.5px);color:var(--ink-faint);
  font-weight:500;text-align:center;margin-top:-5px;
}

/* ---------- Footer ---------- */
.footer{
  max-width:1480px;margin:42px auto 0;
  padding-top:20px;border-top:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:10px;
  color:var(--ink-faint);font-size:13px;
}
.footer a{
  color:var(--ink-faint);text-decoration:none;
  display:inline-flex;align-items:center;gap:5px;
  transition:color .2s;
}
.footer a:hover{color:var(--teal)}

/* ---------- Entrance animation ---------- */
.fade-up{opacity:0;transform:translateY(14px);animation:fadeUp .55s ease forwards}
.d1{animation-delay:.05s}.d2{animation-delay:.12s}.d3{animation-delay:.19s}
.d4{animation-delay:.26s}.d5{animation-delay:.33s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* ---------- Responsive ---------- */
@media(max-width:1080px){
  .main-grid{grid-template-columns:repeat(2,1fr)}
  .bottom-grid{grid-template-columns:1fr}
}
@media(max-width:680px){
  body{padding:22px 14px 46px}
  .main-grid{grid-template-columns:1fr;gap:16px}
  .thumb-grid{grid-template-columns:repeat(2,1fr)}
  .internal-grid{grid-template-columns:repeat(3,1fr);gap:9px}
  .header{align-items:stretch}
  .year-box{flex:1}
}
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important}
  .fade-up{opacity:1;transform:none}
}
</style>
</head>

/* ---------- Render ---------- */
function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* แปลงลิงก์แชร์ Google Drive ให้เป็นลิงก์ภาพที่ใช้ใน <img> ได้
   รองรับ: /file/d/ID/view , ?id=ID , uc?export=view&id=ID
   ⚠️ ไฟล์ต้องตั้งแชร์เป็น "ทุกคนที่มีลิงก์" (Anyone with the link) */
function normalizeImg(u){
  u = String(u||'').trim();
  if (!u) return '';
  let id = '';
  let m = u.match(/drive\.google\.com\/file\/d\/([\w-]{20,})/);
  if (m) id = m[1];
  if (!id) { m = u.match(/[?&]id=([\w-]{20,})/); if (m && /drive\.google\.com|docs\.google\.com/.test(u)) id = m[1]; }
  if (!id) { m = u.match(/lh3\.googleusercontent\.com\/d\/([\w-]{20,})/); if (m) return u; }
  if (id) return 'https://drive.google.com/thumbnail?id=' + id + '&sz=w1600';
  return u;
}

function safeUrl(u){
  u = String(u||'').trim();
  return /^https?:\/\//i.test(u) ? u : '#';
}
function iconOrImage(item, cls){
  if (item.image) return `<img class="${cls}" src="${esc(normalizeImg(item.image))}" alt="" loading="lazy">`;
  const svg = ICONS[item.icon] || ICONS.social;
  return `<div class="${cls} ph" aria-hidden="true">${svg}</div>`;
}

function render(cfg){
  document.getElementById('siteTitle').textContent = cfg.siteTitle || DEFAULT_CONFIG.siteTitle;
  document.getElementById('footerText').textContent = cfg.footerText || DEFAULT_CONFIG.footerText;
  document.title = cfg.siteTitle || DEFAULT_CONFIG.siteTitle;

  // ปี
  const yearSel = document.getElementById('yearSelect');
  const years = (cfg.years && cfg.years.length) ? cfg.years : DEFAULT_CONFIG.years;
  yearSel.innerHTML = years.map((y,i) => `<option value="${i}">${esc(y.label)}</option>`).join('');
  yearSel.onchange = () => {
    const y = years[yearSel.value];
    if (y && y.url) window.open(safeUrl(y.url), '_blank', 'noopener');
  };

  // กล่องหมวดหลัก
  const chipMap = { social:'chip-social', econ:'chip-econ', env:'chip-env' };
  document.getElementById('mainGrid').innerHTML = (cfg.mainCards||[]).map(c => `
    <a class="cat-card" href="${safeUrl(c.url)}" target="_blank" rel="noopener">
      <div class="cat-head">
        <div class="cat-icon ${chipMap[c.icon]||'chip-default'}" aria-hidden="true">${ICONS[c.icon] || ICONS.social}</div>
        <div class="cat-title">${esc(c.title)}</div>
      </div>
      ${c.image
        ? `<img class="cat-img" src="${esc(normalizeImg(c.image))}" alt="${esc(c.title)}" loading="lazy">`
        : `<div class="cat-img placeholder">ยังไม่มีภาพประกอบ</div>`}
      <div class="cat-foot">ดูข้อมูล <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    </a>`).join('');

  // สถิติที่น่าสนใจ
  document.getElementById('highlightTitle').textContent = cfg.highlightTitle || DEFAULT_CONFIG.highlightTitle;
  document.getElementById('thumbGrid').innerHTML = (cfg.highlights||[]).map(t => `
    <a class="thumb" href="${safeUrl(t.url)}" target="_blank" rel="noopener">
      ${iconOrImage(t, '')}
      <span class="thumb-label">${esc(t.label)}</span>
    </a>`).join('');

  // ข้อมูลภายในจังหวัด
  document.getElementById('internalTitle').textContent = cfg.internalTitle || DEFAULT_CONFIG.internalTitle;
  document.getElementById('internalGrid').innerHTML = (cfg.internals||[]).map(t => `
    <a class="internal-item" href="${safeUrl(t.url)}" target="_blank" rel="noopener">
      <div class="internal-icon">${t.image ? `<img src="${esc(normalizeImg(t.image))}" alt="" loading="lazy">` : (ICONS[t.icon]||ICONS.money)}</div>
      <span class="internal-label">${esc(t.label)}</span>
      ${t.sub ? `<span class="internal-sub">${esc(t.sub)}</span>` : ''}
    </a>`).join('');
}

/* ---------- โหลด config จาก GAS (JSONP เลี่ยง CORS) ---------- */
function loadFromGAS(){
  return new Promise(resolve => {
    if (!GAS_URL) return resolve(null);
    const cb = 'nblCfg_' + Date.now();
    const timer = setTimeout(() => { cleanup(); resolve(null); }, 8000);
    function cleanup(){ delete window[cb]; script.remove(); clearTimeout(timer); }
    window[cb] = data => { cleanup(); resolve(data && data.ok ? data.config : null); };
    const script = document.createElement('script');
    script.src = GAS_URL + (GAS_URL.includes('?') ? '&' : '?') + 'callback=' + cb;
    script.onerror = () => { cleanup(); resolve(null); };
    document.body.appendChild(script);
  });
}

(async function init(){
  render(DEFAULT_CONFIG);
  const remote = await loadFromGAS();
  if (remote) render(Object.assign({}, DEFAULT_CONFIG, remote));
})();
</script>
